name: Backend CI

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  backend_deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - uses: docker/setup-buildx-action@v2

    - name: Build images
      timeout-minutes: 10
      run: |
        cd backend
        docker compose build

    - name: Setup Postgres DB
      run: |
        cd backend
        docker compose up -d db
      env:
        DB_USER: ${{ vars.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ vars.DB_NAME }}
        DB_PORT: ${{ vars.DB_PORT }}

    - name: Run containers
      timeout-minutes: 10
      run: |
        cd backend
        docker compose up -d backend
      env:
        DB_USER: ${{ vars.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ vars.DB_NAME }}
        DB_PORT: ${{ vars.DB_PORT }}
        DB_SSLMODE: ${{ vars.DB_SSLMODE }}
        LLM_PORT: ${{ vars.LLM_PORT }}
        APP_PORT: ${{ vars.APP_PORT }}
        LOG_LEVEL: ${{ vars.LOG_LEVEL }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        MODEL_NAME: ${{ vars.MODEL_NAME }}
        
    - name: Wait for Backend Health
      timeout-minutes: 2
      run: |
        cd backend
        echo "Проверка доступности API на порту ${{ vars.APP_PORT }}..."
        set +e

        for i in $(seq 1 40); do
          # curl выводит только HTTP-код. 2>/dev/null скрывает ошибки соединения.
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 2 --max-time 5 \
            -X POST "http://localhost:${{ vars.APP_PORT }}/register" \
            -H "Content-Type: application/json" \
            -d '{"login":"check@mail.ru","password":"Check123!","name":"check","email":"check@mail.ru"}' 2>/dev/null)
          
          # Удаляем возможные скрытые символы и пробелы
          HTTP_CODE="${HTTP_CODE//[$'\t\r\n ']/}"

          # 000 = нет соединения. Любой другой код (200, 400, 500) = сервер запущен и слушает порт
          if [ "$HTTP_CODE" != "000" ] && [ -n "$HTTP_CODE" ]; then
            echo "Backend начал отвечать (HTTP $HTTP_CODE) на попытке $i"
            exit 0
          fi

          # Лог прогресса каждые 15 попыток (~30 сек)
          if [ $((i % 15)) -eq 0 ]; then
            echo "Попытка $i/60... (порт пока не отвечает)"
            echo "Логи backend (последние 10 строк):"
            docker compose logs go_backend --tail=10
          fi
          sleep 2
        done

        echo "Backend не ответил за 2 минуты!"
        echo "Полный лог для отладки:"
        docker compose logs go_backend
        exit 1

    - name: Run API Tests
      timeout-minutes: 5
      run: |
        cd backend
        set +e
        API_URL="http://localhost:${{ vars.APP_PORT }}"
        PASS=0
        FAIL=0

        check_status() {
          local expected="$1"
          local actual="$2"
          local msg="$3"
          if [ "$actual" = "$expected" ]; then
            echo "PASS: $msg"
            PASS=$((PASS + 1))
          else
            echo "FAIL: $msg (ожидалось: $expected, получено: $actual)"
            FAIL=$((FAIL + 1))
          fi
        }

        echo "Запуск тестов API..."

        # 1. Регистрация
        REG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_URL/register" \
          -H "Content-Type: application/json" \
          -d "{\"login\":\"ci@test.ru\",\"password\":\"CiPass123!\",\"name\":\"CI\",\"email\":\"ci@test.ru\"}")
        check_status "201" "$REG_STATUS" "POST /register"

        # 2. Логин
        LOGIN_RESP=$(curl -s -X POST "$API_URL/login" \
          -H "Content-Type: application/json" \
          -d "{\"login\":\"ci@test.ru\",\"password\":\"CiPass123!\"}")
        echo "Ответ /login: $LOGIN_RESP"

        TOKEN=$(echo "$LOGIN_RESP" | jq -r '.token // empty' 2>/dev/null)

        if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
          echo "PASS: POST /login (токен получен)"
          PASS=$((PASS + 1))
          AUTH_HEADER="Authorization: $TOKEN"
        else
          echo "FAIL: POST /login (токен не извлечён)"
          FAIL=$((FAIL + 1))
          AUTH_HEADER=""
        fi

        # 3. Тесты с авторизацией
        if [ -n "$AUTH_HEADER" ]; then
          CHAT_RESP=$(curl -s -X POST "$API_URL/chat/1" \
            -H "Content-Type: application/json" \
            -H "$AUTH_HEADER")
          if echo "$CHAT_RESP" | jq -e '.chat_id' >/dev/null 2>&1; then
            echo "PASS: POST /chat/{userId}"
            PASS=$((PASS + 1))
          else
            echo "FAIL: POST /chat/{userId} | Ответ: $CHAT_RESP"
            FAIL=$((FAIL + 1))
          fi

          # MSG_RESP=$(curl -s -X POST "$API_URL/message" \
          #   -H "Content-Type: application/json" \
          #   -H "$AUTH_HEADER" \
          #   -d '{"chat_id":1,"message":"CI test"}')
          # if echo "$MSG_RESP" | jq -e '.response' >/dev/null 2>&1; then
          #   echo "PASS: POST /message"
          #   PASS=$((PASS + 1))
          # else
          #   echo "FAIL: POST /message | Ответ: $MSG_RESP"
          #   FAIL=$((FAIL + 1))
          # fi

          # BATCH_RESP=$(curl -s -X GET "$API_URL/msg_batch/1" \
          #   -H "Content-Type: application/json" \
          #   -H "$AUTH_HEADER")
          # if echo "$BATCH_RESP" | jq -e '.messages' >/dev/null 2>&1; then
          #   echo "PASS: GET /msg_batch/{chatId}"
          #   PASS=$((PASS + 1))
          # else
          #   echo "FAIL: GET /msg_batch/{chatId} | Ответ: $BATCH_RESP"
          #   FAIL=$((FAIL + 1))
          # fi

          SURVEY_RESP=$(curl -s -X GET "$API_URL/survey/status" \
            -H "Content-Type: application/json" \
            -H "$AUTH_HEADER")
          if echo "$SURVEY_RESP" | jq -e '.completed' >/dev/null 2>&1; then
            echo "PASS: GET /survey/status"
            PASS=$((PASS + 1))
          else
            echo "FAIL: GET /survey/status | Ответ: $SURVEY_RESP"
            FAIL=$((FAIL + 1))
          fi

          NO_AUTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$API_URL/survey/status")
          check_status "401" "$NO_AUTH_STATUS" "GET /survey/status (без авторизации)"

          LOGOUT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_URL/logout" -H "$AUTH_HEADER")
          check_status "200" "$LOGOUT_STATUS" "POST /logout"
        fi

        echo ""
        echo "=== ИТОГИ ТЕСТИРОВАНИЯ API ==="
        echo "Пройдено: $PASS"
        echo "С ошибками: $FAIL"
        echo "======================="

        if [ "$FAIL" -gt 0 ]; then
          echo "Тесты не пройдены. Логи backend для отладки:"
          docker compose logs backend --tail=100
          exit 1
        fi
        echo "Все тесты API успешно пройдены!"

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USER }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Publish images to Docker Hub
      timeout-minutes: 15
      run: |
        cd backend
        docker push arperinn/together-backend:latest
