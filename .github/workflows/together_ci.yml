name: Backend CI

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  backend_deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - uses: docker/setup-buildx-action@v2

    - name: Build images
      timeout-minutes: 10
      run: |
        cd backend
        docker compose build

    - name: Setup Postgres DB
      run: |
        cd backend
        docker compose up -d db
      env:
        DB_USER: ${{ vars.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ vars.DB_NAME }}
        DB_PORT: ${{ vars.DB_PORT }}

    - name: Run containers
      timeout-minutes: 10
      run: |
        cd backend
        docker compose up -d backend
      env:
        DB_USER: ${{ vars.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ vars.DB_NAME }}
        DB_PORT: ${{ vars.DB_PORT }}
        DB_SSLMODE: ${{ vars.DB_SSLMODE }}
        LLM_PORT: ${{ vars.LLM_PORT }}
        APP_PORT: ${{ vars.APP_PORT }}
        LOG_LEVEL: ${{ vars.LOG_LEVEL }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        MODEL_NAME: ${{ vars.MODEL_NAME }}

    - name: Wait for Backend to be Ready
      run: |
        cd backend
        echo "–Ю–ґ–Є–і–∞–љ–Є–µ –Ј–∞–њ—Г—Б–Ї–∞ backend API..."
        for i in {1..30}; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ vars.APP_PORT }}/ 2>/dev/null || echo "000")
          if [[ "$STATUS" != "000" ]]; then
            echo "Backend –і–Њ—Б—В—Г–њ–µ–љ (HTTP $STATUS)"
            break
          fi
          sleep 2
        done
        if [[ "$STATUS" == "000" ]]; then
          echo "Backend –љ–µ –Ј–∞–њ—Г—Б—В–Є–ї—Б—П –≤ —В–µ—З–µ–љ–Є–µ 60—Б. –Ы–Њ–≥–Є:"
          docker compose logs backend
          exit 1
        fi

    - name: Run API Tests
      timeout-minutes: 5
      run: |
        cd backend
        set +e # –Ю—В–Ї–ї—О—З–∞–µ–Љ exit on error, —З—В–Њ–±—Л –Ї–Њ–љ—В—А–Њ–ї–Є—А–Њ–≤–∞—В—М —Б—В–∞—В—Г—Б—Л –≤—А—Г—З–љ—Г—О
        API_URL="http://localhost:${{ vars.APP_PORT }}"
        PASS=0
        FAIL=0

        check() {
          local expected=$1 actual=$2 msg=$3
          actual=$(echo "$actual" | tr -d '[:space:]')
          if [[ "$actual" == "$expected" ]]; then
            echo "PASS: $msg"
            PASS=$((PASS+1))
          else
            echo "FAIL: $msg (–Ю–ґ–Є–і–∞–ї–Њ—Б—М: $expected, –Я–Њ–ї—Г—З–µ–љ–Њ: $actual)"
            FAIL=$((FAIL+1))
          fi
        }

        echo "–Ч–∞–њ—Г—Б–Ї —В–µ—Б—В–Њ–≤ API..."

        # 1. –†–µ–≥–Є—Б—В—А–∞—Ж–Є—П
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_URL/register" \
          -H "Content-Type: application/json" \
          -d '{"login":"ci_test@example.com","password":"SecurePass123!","name":"ci_user", "email":"ci_test@example.com"}')
        check "201" "$STATUS" "POST /register"

        # 2. –Ы–Њ–≥–Є–љ –Є –Є–Ј–≤–ї–µ—З–µ–љ–Є–µ —В–Њ–Ї–µ–љ–∞
        LOGIN_RESP=$(curl -s -X POST "$API_URL/login" \
          -H "Content-Type: application/json" \
          -d '{"login":"ci_test@example.com","password":"SecurePass123!"}')
        # –Р–і–∞–њ—В–Є—А—Г–є—В–µ –Ї–ї—О—З–Є –њ–Њ–і –≤–∞—И —Д–Њ—А–Љ–∞—В –Њ—В–≤–µ—В–∞
        TOKEN=$(echo "$LOGIN_RESP" | jq -r '.token' 2>/dev/null)

        if [[ -n "$TOKEN" && "$TOKEN" != "null" ]]; then
          echo "PASS: POST /login (—В–Њ–Ї–µ–љ –њ–Њ–ї—Г—З–µ–љ)"
          PASS=$((PASS+1))
          # –Х—Б–ї–Є –Є—Б–њ–Њ–ї—М–Ј—Г–µ—В—Б—П –љ–µ Bearer, –Є–Ј–Љ–µ–љ–Є—В–µ —Б—В—А–Њ–Ї—Г –љ–Є–ґ–µ
          AUTH_HEADER="Authorization: $TOKEN"
        else
          echo "FAIL: POST /login (—В–Њ–Ї–µ–љ –љ–µ –љ–∞–є–і–µ–љ –≤ –Њ—В–≤–µ—В–µ)"
          FAIL=$((FAIL+1))
        fi

        # 3. –Ч–∞—Й–Є—Й—С–љ–љ—Л–є —Н–љ–і–њ–Њ–Є–љ—В (—Б –≤–∞–ї–Є–і–љ—Л–Љ —В–Њ–Ї–µ–љ–Њ–Љ)
        if [[ -n "$AUTH_HEADER" ]]; then
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$API_URL/survey/status" -H "$AUTH_HEADER")
          check "200" "$STATUS" "GET /survey/status (–∞–≤—В–Њ—А–Є–Ј–Њ–≤–∞–љ)"

          # 4. –Ч–∞—Й–Є—Й—С–љ–љ—Л–є —Н–љ–і–њ–Њ–Є–љ—В (–±–µ–Ј —В–Њ–Ї–µ–љ–∞)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$API_URL/survey/status")
          check "401" "$STATUS" "GET /survey/status (–±–µ–Ј –∞–≤—В–Њ—А–Є–Ј–∞—Ж–Є–Є)"
        fi

        # 5. –Т—Л—Е–Њ–і
        if [[ -n "$AUTH_HEADER" ]]; then
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_URL/logout" -H "$AUTH_HEADER")
          check "200" "$STATUS" "POST /logout"
        fi

        echo "–Ш—В–Њ–≥: $PASS —В–µ—Б—В–Њ–≤ –њ—А–Њ–є–і–µ–љ–Њ, $FAIL —В–µ—Б—В–Њ–≤ —Г–њ–∞–ї–Њ"
        if [[ $FAIL -gt 0 ]]; then
          echo "–Ґ–µ—Б—В—Л API –љ–µ –њ—А–Њ–є–і–µ–љ—Л. –Ч–∞–њ—Г—Б–Ї CI –Њ—Б—В–∞–љ–Њ–≤–ї–µ–љ."
          exit 1
        fi
        echo "–Т—Б–µ —В–µ—Б—В—Л API —Г—Б–њ–µ—И–љ–Њ –њ—А–Њ–є–і–µ–љ—Л!"

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USER }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Publish images to Docker Hub
      timeout-minutes: 15
      run: |
        cd backend
        docker push arperinn/together-backend:latest
