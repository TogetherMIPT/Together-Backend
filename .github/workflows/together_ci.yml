name: Backend CI

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  backend_deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - uses: docker/setup-buildx-action@v2

    - name: Build images
      timeout-minutes: 10
      run: |
        cd backend
        docker compose build

    - name: Setup Postgres DB
      run: |
        cd backend
        docker compose up -d db
      env:
        DB_USER: ${{ vars.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ vars.DB_NAME }}
        DB_PORT: ${{ vars.DB_PORT }}

    - name: Run containers
      timeout-minutes: 10
      run: |
        cd backend
        docker compose up -d backend
      env:
        DB_USER: ${{ vars.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ vars.DB_NAME }}
        DB_PORT: ${{ vars.DB_PORT }}
        DB_SSLMODE: ${{ vars.DB_SSLMODE }}
        LLM_PORT: ${{ vars.LLM_PORT }}
        APP_PORT: ${{ vars.APP_PORT }}
        LOG_LEVEL: ${{ vars.LOG_LEVEL }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        MODEL_NAME: ${{ vars.MODEL_NAME }}

    - name: Wait for Backend Health
      timeout-minutes: 2
      run: |
        cd backend
        echo "Проверка доступности API..."
        
        # Пробуем 40 раз с интервалом 3с = максимум 2 минуты
        for i in $(seq 1 40); do
          # Пингуем через docker compose exec, чтобы избежать проблем с сетью
          if docker compose exec -T backend curl -sf http://localhost:${{ vars.APP_PORT }}/register -X POST \
            -H "Content-Type: application/json" \
            -d '{"login":"hc","password":"Hc123!","name":"hc","email":"hc@t.t"}' >/dev/null 2>&1; then
            echo "Backend готов к тестам (попытка $i)"
            exit 0
          fi
          echo "Попытка $i: ожидание запуска..."
          sleep 3
        done
        
        echo "Backend не ответил за 2 минуты. Логи:"
        docker compose logs backend --tail=50
        exit 1

    - name: Run API Tests
      timeout-minutes: 5
      run: |
        cd backend
        set +e # Отключаем exit on error, чтобы контролировать статусы вручную
        API_URL="http://localhost:${{ vars.APP_PORT }}"
        PASS=0
        FAIL=0

        check() {
          local expected=$1 actual=$2 msg=$3
          actual=$(echo "$actual" | tr -d '[:space:]')
          if [[ "$actual" == "$expected" ]]; then
            echo "PASS: $msg"
            PASS=$((PASS+1))
          else
            echo "FAIL: $msg (Ожидалось: $expected, Получено: $actual)"
            FAIL=$((FAIL+1))
          fi
        }

        echo "Запуск тестов API..."

        # 1. Регистрация нового пользователя
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_URL/register" \
          -H "Content-Type: application/json" \
          -d '{"login":"ci_test","password":"CiPass123!","name":"CI Test","email":"ci@test.ru"}')
        check "200" "$STATUS" "POST /register"

        # 2. Логин и получение токена
        LOGIN_RESP=$(curl -s -X POST "$API_URL/login" \
          -H "Content-Type: application/json" \
          -d '{"login":"ci_test","password":"CiPass123!"}')
        TOKEN=$(echo "$LOGIN_RESP" | jq -r '.token // empty' 2>/dev/null)

        if [[ -n "$TOKEN" && "$TOKEN" != "null" ]]; then
          echo "PASS: POST /login (токен получен)"
          PASS=$((PASS+1))
          AUTH_HEADER="Authorization: $TOKEN"
        else
          echo "FAIL: POST /login (токен не найден). Ответ: $LOGIN_RESP"
          FAIL=$((FAIL+1))
        fi

        # 3. Создание чата (защищённый эндпоинт)
        if [[ -n "$AUTH_HEADER" ]]; then
          # (user_id=1 в тестовой среде)
          CHAT_RESP=$(curl -s -X POST "$API_URL/chat/1" \
            -H "Content-Type: application/json" \
            -H "$AUTH_HEADER")
          CHAT_STATUS=$(echo "$CHAT_RESP" | jq -r '.chat_id // empty' 2>/dev/null)
          if [[ -n "$CHAT_STATUS" && "$CHAT_STATUS" != "null" ]]; then
            echo "PASS: POST /chat/{userId}"
            PASS=$((PASS+1))
          else
            echo "FAIL: POST /chat/{userId}. Ответ: $CHAT_RESP"
            FAIL=$((FAIL+1))
          fi

        # 4. Защищённый эндпоинт (с валидным токеном)
        if [[ -n "$AUTH_HEADER" ]]; then
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$API_URL/survey/status" -H "$AUTH_HEADER")
          check "200" "$STATUS" "GET /survey/status (авторизован)"

          # 5. Защищённый эндпоинт (без токена)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$API_URL/survey/status")
          check "401" "$STATUS" "GET /survey/status (без авторизации)"
        fi

        # 6. Выход
        if [[ -n "$AUTH_HEADER" ]]; then
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_URL/logout" -H "$AUTH_HEADER")
          check "200" "$STATUS" "POST /logout"
        fi

        echo "Итог: $PASS тестов пройдено, $FAIL тестов упало"
        if [[ $FAIL -gt 0 ]]; then
          echo "Тесты API не пройдены. Запуск CI остановлен."
          exit 1
        fi
        echo "Все тесты API успешно пройдены!"

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USER }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Publish images to Docker Hub
      timeout-minutes: 15
      run: |
        cd backend
        docker push arperinn/together-backend:latest
